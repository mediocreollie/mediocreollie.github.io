name: Deploy Astro+Tina

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build TinaCMS admin
        run: npx tinacms build --skip-cloud-checks || echo "Tina build skipped"

      - name: Build Astro site
        run: npm run build

      - name: Verify admin route
        run: |
          ls -la dist
          ls -la dist/admin || echo "No admin folder found"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - uses: actions/deploy-pages@v4
