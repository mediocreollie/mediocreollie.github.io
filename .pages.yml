media:
  input: public/images
  output: /images

content:
  - name: blog
    label: Blog Posts
    type: collection
    path: src/content/blog
    filename: "{fields.slug}.md"
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: description
        label: Description
        type: text
      - name: pubDate
        label: Publish Date
        type: date
      - name: updatedDate
        label: Updated Date
        type: date
      - name: heroImage
        label: Hero Image
        type: image
      - name: draft
        label: Draft
        type: boolean
        description: Tick this to hide the post from the live site.
      - name: body
        label: Body
        type: rich-text

  - name: pages
    label: Pages
    type: collection
    path: src/content/pages
    filename: "{fields.slug}.md"
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: intro
        label: Intro
        type: text
      - name: heroEyebrow
        label: Hero Eyebrow
        type: string
      - name: heroTitle
        label: Hero Title
        type: string
      - name: heroSubtitle
        label: Hero Subtitle
        type: text
      - name: primaryButtonText
        label: Primary Button Text
        type: string
      - name: primaryButtonUrl
        label: Primary Button URL
        type: string
      - name: secondaryButtonText
        label: Secondary Button Text
        type: string
      - name: secondaryButtonUrl
        label: Secondary Button URL
        type: string
      - name: heroImage
        label: Hero Image
        type: image
      - name: heroImageMaxWidth
        label: Hero Image Max Width
        type: string
        description: "Max width example: 500px, 600px, 40rem"
      - name: heroImageHeight
        label: Hero Image Height
        type: string
        description: "Height example: 350px, 450px, auto"
      - name: heroImageObjectFit
        label: Hero Image Object Fit
        type: string
        description: "Object fit example: cover, contain"
      - name: heroImageColumnWidth
        label: Hero Image Column Width
        type: string
        description: "Column width example: 40%, 45%, 50%"
      - name: heroImageTranslateX
        label: Hero Image Horizontal Offset
        type: string
        description: "Use values like -40px, 0px, 40px. Positive moves image right, negative moves image left."
      - name: mobileHeroImageMaxWidth
        label: Mobile Hero Image Max Width
        type: string
        description: "Max width example: 100%, 320px, 20rem"
      - name: mobileHeroImageHeight
        label: Mobile Hero Image Height
        type: string
        description: "Height example: 360px, 420px, auto"
      - name: mobileHeroImageObjectFit
        label: Mobile Hero Image Object Fit
        type: string
        description: "Object fit example: cover, contain"
      - name: mobileHeroImageTranslateX
        label: Mobile Hero Image Horizontal Offset
        type: string
        description: "Use values like -20px, 0px, 20px. Positive moves image right, negative moves image left."
      - name: mobileHeroTextAlign
        label: Mobile Hero Text Align
        type: string
        description: "Text align example: left, center, right"
      - name: mobileHeroTitleSize
        label: Mobile Hero Title Size
        type: string
        description: "Title font size example: 3rem, 2.5rem"
      - name: mobileShowHeroImage
        label: Show Hero Image on Mobile
        type: boolean
      - name: latestPostsTitle
        label: Latest Posts Section Title
        type: string
      - name: body
        label: Body
        type: rich-text

  - name: settings
    label: Site Settings
    type: collection
    path: src/content/settings
    filename: "{fields.slug}.md"
    fields:
      - name: siteTitle
        label: Site Title
        type: string
        required: true
      - name: navLinks
        label: Navigation Links
        type: object
        list: true
        fields:
          - name: label
            label: Link Label
            type: string
            required: true
          - name: url
            label: Link URL
            type: string
            required: true
      - name: socialLinks
        label: Social Links
        type: object
        list: true
        fields:
          - name: label
            label: Social Label
            type: string
            required: true
          - name: url
            label: Social URL
            type: string
            required: true
          - name: icon
            label: Icon
            type: string
            description: "Icon name: mastodon, twitter, github"
