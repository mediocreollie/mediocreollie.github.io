media:
  input: public/images
  output: /images

content:
  - name: blog
    label: Blog Posts
    type: collection
    path: src/content/blog
    filename: "{fields.slug}.md"
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: description
        label: Description
        type: text
      - name: pubDate
        label: Publish Date
        type: date
      - name: updatedDate
        label: Updated Date
        type: date
      - name: heroImage
        label: Hero Image
        type: image
      - name: body
        label: Body
        type: rich-text

  - name: pages
    label: Pages
    type: collection
    path: src/content/pages
    filename: "{fields.slug}.md"
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: intro
        label: Intro
        type: text
      - name: heroEyebrow
        label: Hero Eyebrow
        type: string
      - name: heroTitle
        label: Hero Title
        type: string
      - name: heroSubtitle
        label: Hero Subtitle
        type: text
      - name: primaryButtonText
        label: Primary Button Text
        type: string
      - name: primaryButtonUrl
        label: Primary Button URL
        type: string
      - name: secondaryButtonText
        label: Secondary Button Text
        type: string
      - name: secondaryButtonUrl
        label: Secondary Button URL
        type: string
      - name: heroImage
        label: Hero Image
        type: image
      - name: latestPostsTitle
        label: Latest Posts Section Title
        type: string
      - name: body
        label: Body
        type: rich-text
